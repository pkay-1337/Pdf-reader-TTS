<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local AI PDF Reader</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">

    <style>
        /* Define color variables for light and dark themes */
        :root {
            --bg-color: #f0f4f8;
            --text-color: #1e293b;
            --sidebar-bg: white;
            --sidebar-border: #e2e8f0;
            --card-bg: white;
            --panel-bg: #f8fafc;
            --brand-color: #1e3a8a;
            --primary-accent: #2563eb;
            --secondary-accent: #eff6ff;
            --btn-border: #cbd5e1;
            --canvas-bg: white;
            --canvas-shadow: rgba(0, 0, 0, 0.08);
            --text-muted: #64748b;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --sidebar-bg: #1e293b;
            --sidebar-border: #334155;
            --card-bg: #1e293b;
            --panel-bg: #334155;
            --brand-color: #38bdf8;
            --primary-accent: #38bdf8;
            --secondary-accent: #0f172a;
            --btn-border: #475569;
            --canvas-bg: #1e293b;
            --canvas-shadow: rgba(0, 0, 0, 0.5);
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .screen { display: none; width: 100%; height: 100vh; }
        .screen.active { display: flex; }

        /* Welcome Screen UI */
        #welcome-screen { justify-content: center; align-items: center; padding: 40px; }
        .upload-card {
            background: var(--card-bg); padding: 60px 40px; border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(30, 41, 59, 0.08); text-align: center;
            border: 1px solid var(--sidebar-border); max-width: 500px; width: 100%;
        }
        .upload-card h1 { font-size: 24px; font-weight: 600; margin-bottom: 10px; color: var(--brand-color); }
        .upload-card p { color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; }

        input[type="file"] { display: none; }
        .upload-btn {
            display: inline-block; background-color: var(--primary-accent); color: white;
            padding: 12px 28px; border-radius: 8px; font-size: 16px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .upload-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .upload-btn:active { transform: translateY(1px); }

        /* Reader Screen UI */
        #reader-screen { flex-direction: row; }

        .sidebar {
            position: relative; flex: 0 0 260px; width: 260px; height: 100vh;
            background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); padding: 28px 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 4px 0 24px rgba(30, 41, 59, 0.03); z-index: 10;
            overflow-y: auto;
        }
        .sidebar-top { display: flex; flex-direction: column; gap: 18px; }
        .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary-accent); box-shadow: 0 0 0 4px rgba(37,99,235,0.15); }
        .brand-name { font-size: 13px; font-weight: 700; color: var(--brand-color); letter-spacing: 0.03em; text-transform: uppercase; }

        /* Dark Mode Toggle Container */
        .theme-toggle-container {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--panel-bg); padding: 10px 15px; border-radius: 10px;
            border: 1px solid var(--sidebar-border); margin-bottom: 4px;
        }
        .theme-toggle-label {
            font-size: 12px; font-weight: 700; color: var(--text-color);
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .switch {
            position: relative; display: inline-block; width: 44px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1;
            transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Control Panels */
        .control-panel {
            display: flex; flex-direction: column; gap: 10px;
            background: var(--panel-bg); padding: 15px; border-radius: 10px; border: 1px solid var(--sidebar-border);
        }
        .control-panel label {
            font-size: 12px; font-weight: 700; color: var(--text-color);
            display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .control-panel label span { color: var(--primary-accent); font-weight: 700; }

        input[type="range"] {
            width: 100%; cursor: pointer; accent-color: var(--primary-accent);
        }

        .zoom-btn-row { display: flex; gap: 8px; }
        .zoom-btn {
            flex: 1; background: var(--sidebar-bg); border: 1px solid var(--btn-border); color: var(--text-color);
            padding: 6px 0; border-radius: 6px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.15s ease; line-height: 1;
        }
        .zoom-btn:hover { background: var(--secondary-accent); }
        .zoom-btn:active { transform: translateY(1px); }

        #play-page-btn {
            background: var(--primary-accent); color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.15);
        }
        #play-page-btn:hover { filter: brightness(1.1); }
        #play-page-btn:active { transform: translateY(1px); }

        .tts-status {
            display: none; flex-direction: column; gap: 6px; margin-top: 2px;
        }
        .tts-status.active { display: flex; }
        .tts-progress-track {
            width: 100%; height: 6px; border-radius: 999px; background: var(--sidebar-border); overflow: hidden;
        }
        .tts-progress-fill {
            height: 100%; width: 0%; border-radius: 999px;
            background: linear-gradient(90deg, #60a5fa, var(--primary-accent));
            transition: width 0.25s ease;
        }
        .tts-status-text {
            font-size: 12px; color: var(--text-muted); text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .tts-status-text::before {
            content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--primary-accent);
            animation: tts-pulse 1.2s ease-in-out infinite;
        }
        @keyframes tts-pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1); }
        }

        .page-info {
            font-size: 17px; font-weight: 700; color: var(--brand-color); background: var(--secondary-accent);
            padding: 10px 16px; border-radius: 8px; width: 100%; text-align: center;
            border: 1px solid var(--btn-border);
        }
        .page-nav-row { display: flex; gap: 8px; width: 100%; }
        .page-nav-btn {
            flex: 1; background: var(--sidebar-bg); border: 1px solid var(--btn-border); color: var(--text-color);
            padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.15s ease;
        }
        .page-nav-btn:hover:not(:disabled) { background: var(--secondary-accent); }
        .page-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .keyboard-hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 4px; line-height: 1.4; }

        button.close-btn {
            padding: 10px 16px; cursor: pointer; border: 1px solid #fca5a5;
            border-radius: 8px; background: var(--sidebar-bg); color: #ef4444; font-weight: 600;
            font-size: 14px; transition: all 0.2s ease; width: 100%;
        }
        button.close-btn:hover { background: #fef2f2; border-color: #ef4444; }
        [data-theme="dark"] button.close-btn:hover { background: #7f1d1d; color: #fca5a5; }

        /* PDF Canvas Container */
        .pdf-viewer-area {
            flex: 1 1 auto; height: 100vh; padding: 40px;
            display: flex; justify-content: center; align-items: flex-start;
            overflow: auto;
        }
        #pdf-container {
            position: relative; background: var(--canvas-bg); box-shadow: 0 20px 25px -5px var(--canvas-shadow);
            border-radius: 8px; overflow: hidden;
            flex-shrink: 0;
            transition: filter 0.3s ease;
        }
        
        /* Dark mode conversion rule to invert standard white backgrounds of PDFs safely */
        [data-theme="dark"] #pdf-container {
            filter: invert(0.9) hue-rotate(180deg);
        }

        canvas { display: block; }

        .textLayer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            line-height: 1;
            pointer-events: auto;
            user-select: text;
            opacity: 1;
        }

        .textLayer span,
        .textLayer br {
            position: absolute;
            white-space: pre;
            transform-origin: 0% 0%;
            color: transparent;
            cursor: text;
        }

        ::selection {
            background: rgba(37, 99, 235, 0.35);
        }

        .textLayer ::selection {
            background: rgba(37, 99, 235, 0.35);
        }

        mark.reading-highlight {
            background-color: rgba(59, 130, 246, 0.32) !important;
            mix-blend-mode: multiply;
            border-radius: 2px;
            color: transparent !important;
        }
        
        .voice-selector {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--btn-border);
            border-radius: 6px;
            background-color: var(--sidebar-bg);
            color: var(--text-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }
        .voice-selector:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .textLayer span {
            cursor: pointer;
            border-radius: 2px;
            transition: background-color 0.1s ease;
        }
        .textLayer span:hover {
            background-color: rgba(37, 99, 235, 0.15);
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen active">
        <div class="upload-card">
            <h1>AI PDF Reader</h1>
            <p>Select a document to begin. Your files remain completely private and are processed locally.</p>
            <label for="pdf-upload" class="upload-btn">Choose PDF File</label>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </div>
    </div>

    <div id="reader-screen" class="screen">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-dot"></div>
                    <div class="brand-name">AI PDF Reader</div>
                </div>

                <!-- NEW: Dark mode toggle option in sidebar -->
                <div class="theme-toggle-container">
                    <span class="theme-toggle-label">Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                <button id="close-file" class="close-btn">Close Document</button>

                <div class="control-panel">
                    <label for="zoom-slider">Zoom <span id="zoom-val">150%</span></label>
                    <input type="range" id="zoom-slider" min="0.5" max="3.0" step="0.1" value="1.5">
                    <div class="zoom-btn-row">
                        <button id="zoom-out-btn" class="zoom-btn" title="Zoom out">−</button>
                        <button id="zoom-reset-btn" class="zoom-btn" title="Reset to 100%">100%</button>
                        <button id="zoom-in-btn" class="zoom-btn" title="Zoom in">+</button>
                    </div>
                </div>

                <div class="control-panel">
                    <label>TTS Engine</label>
                    <select id="voice-selector" class="voice-selector">
                        <optgroup label="🇺🇸 US Female">
                            <option value="af_heart">Heart (Default)</option>
                            <option value="af_alloy">Alloy</option>
                            <option value="af_aoede">Aoede</option>
                            <option value="af_bella">Bella</option>
                            <option value="af_jessica">Jessica</option>
                            <option value="af_kore">Kore</option>
                            <option value="af_nicole">Nicole</option>
                            <option value="af_nova">Nova</option>
                            <option value="af_river">River</option>
                            <option value="af_sarah">Sarah</option>
                            <option value="af_sky">Sky</option>
                        </optgroup>
                        
                        <optgroup label="🇺🇸 US Male">
                            <option value="am_adam">Adam</option>
                            <option value="am_echo">Echo</option>
                            <option value="am_eric">Eric</option>
                            <option value="am_fenrir">Fenrir</option>
                            <option value="am_liam">Liam</option>
                            <option value="am_michael">Michael</option>
                            <option value="am_onyx">Onyx</option>
                            <option value="am_puck">Puck</option>
                            <option value="am_santa">Santa</option>
                        </optgroup>

                        <optgroup label="🇬🇧 UK Female">
                            <option value="bf_alice">Alice</option>
                            <option value="bf_emma">Emma</option>
                            <option value="bf_isabella">Isabella</option>
                            <option value="bf_lily">Lily</option>
                        </optgroup>

                        <optgroup label="🇬🇧 UK Male">
                            <option value="bm_daniel">Daniel</option>
                            <option value="bm_fable">Fable</option>
                            <option value="bm_george">George</option>
                            <option value="bm_lewis">Lewis</option>
                        </optgroup>
                    </select>

                    <label for="speed-slider" style="margin-top: 4px;">Speed <span id="speed-val">1.0x</span></label>
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0">

                    <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
                        <input type="checkbox" id="auto-read-next" checked style="cursor: pointer; accent-color: var(--primary-accent); width: 14px; height: 14px;">
                        <label for="auto-read-next" style="text-transform: none; letter-spacing: normal; font-size: 13px; cursor: pointer; display: inline; color: var(--text-color);">Auto-turn to next page</label>
                    </div>

                    <button id="play-page-btn" style="margin-top: 8px;">▶ Play Current Page</button>
                    
                    <div id="tts-status" class="tts-status">
                        <div class="tts-progress-track">
                            <div id="tts-progress-fill" class="tts-progress-fill"></div>
                        </div>
                        <div id="tts-status-text" class="tts-status-text">Reading sentence 1 / 1</div>
                    </div>
                    <audio id="tts-audio-player" style="display: none;"></audio>
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="page-info">
                    Page <span id="page-num">0</span> / <span id="page-count">0</span>
                </div>
                <div class="page-nav-row">
                    <button id="prev-page-btn" class="page-nav-btn">← Prev</button>
                    <button id="next-page-btn" class="page-nav-btn">Next →</button>
                </div>
                <div class="keyboard-hint">
                    Navigate with ← / →<br>or H / L keys
                </div>
            </div>
        </aside>

        <main class="pdf-viewer-area">
            <div id="pdf-container">
                <canvas id="pdf-canvas"></canvas>
                <div id="text-layer" class="textLayer"></div>
            </div>
        </main>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let isPlaying = false;
        let isAutoContinuing = false; 
        let pdfDoc = null;
        let pageNum = 1;
        let pageIsRendering = false;
        let pageNumPending = null;
        let scale = 1.5;

        const welcomeScreen = document.getElementById('welcome-screen');
        const readerScreen = document.getElementById('reader-screen');
        const fileInput = document.getElementById('pdf-upload');
        const viewerArea = document.querySelector('.pdf-viewer-area');

        const zoomSlider = document.getElementById('zoom-slider');
        const zoomVal = document.getElementById('zoom-val');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');
        const zoomResetBtn = document.getElementById('zoom-reset-btn');

        const prevPageBtn = document.getElementById('prev-page-btn');
        const nextPageBtn = document.getElementById('next-page-btn');

        // --- Dark Mode Switch Script Logic ---
        const themeToggleCheckbox = document.getElementById('theme-toggle-checkbox');
        
        // Load initial preferred configuration from storage or fallback to system settings
        const currentTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggleCheckbox.checked = true;
        }

        themeToggleCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        });

        // --- 1. Database Setup ---
        let db;
        const dbName = "LocalPDFReaderDB";
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = (event) => {
            db = event.target.result;
            db.createObjectStore("documents");
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            loadSavedDocument();
        };

        request.onerror = (event) => console.error("IndexedDB error:", event.target.error);

        // --- 2. Database Helpers ---
        function saveToDB(file, page, currentScale, sentenceIndex = 0) {
            if (!db) return;
            const transaction = db.transaction(["documents"], "readwrite");
            const store = transaction.objectStore("documents");
            store.put({ file: file, page: page, scale: currentScale, sentenceIndex: sentenceIndex }, "lastSession");
        }

        function updateSavedSession(page, currentScale, sentenceIndex = currentIndex) {
            if (!db) return;
            const transaction = db.transaction(["documents"], "readwrite");
            const store = transaction.objectStore("documents");

            const getReq = store.get("lastSession");
            getReq.onsuccess = (e) => {
                const data = e.target.result;
                if (data) {
                    data.page = page;
                    data.scale = currentScale;
                    data.sentenceIndex = sentenceIndex;
                    store.put(data, "lastSession");
                }
            };
        }

        function clearSavedDocument() {
            if (!db) return;
            const transaction = db.transaction(["documents"], "readwrite");
            const store = transaction.objectStore("documents");
            store.delete("lastSession");
        }

        function loadSavedDocument() {
            const transaction = db.transaction(["documents"], "readonly");
            const store = transaction.objectStore("documents");
            const request = store.get("lastSession");

            request.onsuccess = (e) => {
                const data = e.target.result;
                if (data && data.file) {
                    scale = data.scale || 1.5;
                    currentIndex = data.sentenceIndex || 0; 
                    
                    zoomSlider.value = scale;
                    zoomVal.textContent = Math.round(scale * 100) + '%';
                    loadPDF(data.file, data.page);
                }
            };
        }

        // --- 3. Zoom Logic ---
        function setZoom(newScale, { rerender = true } = {}) {
            newScale = Math.min(3.0, Math.max(0.5, newScale));
            newScale = Math.round(newScale * 10) / 10; 
            scale = newScale;
            zoomSlider.value = scale;
            zoomVal.textContent = Math.round(scale * 100) + '%';

            if (pdfDoc && rerender) {
                queueRenderPage(pageNum);
                updateSavedSession(pageNum, scale, currentIndex);
            }
        }

        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');

        speedSlider.addEventListener('input', (e) => {
            speedVal.textContent = parseFloat(e.target.value).toFixed(1) + 'x';
        });

        zoomSlider.addEventListener('input', (e) => {
            zoomVal.textContent = Math.round(parseFloat(e.target.value) * 100) + '%';
        });

        zoomSlider.addEventListener('change', (e) => {
            setZoom(parseFloat(e.target.value));
        });

        zoomInBtn.addEventListener('click', () => setZoom(scale + 0.1));
        zoomOutBtn.addEventListener('click', () => setZoom(scale - 0.1));
        zoomResetBtn.addEventListener('click', () => setZoom(1.0));

        // --- 4. TTS Audio Pipeline ---
        const playBtn = document.getElementById('play-page-btn');
        const voiceSelector = document.getElementById('voice-selector'); 
        const audioPlayer = document.getElementById('tts-audio-player');
        const ttsStatus = document.getElementById('tts-status');
        const ttsProgressFill = document.getElementById('tts-progress-fill');
        const ttsStatusText = document.getElementById('tts-status-text');

        function updateTtsStatus() {
            if (!sentences.length) return;
            const displayIndex = Math.min(currentIndex + 1, sentences.length);
            ttsProgressFill.style.width = Math.round((displayIndex / sentences.length) * 100) + '%';
            ttsStatusText.textContent = `Reading sentence ${displayIndex} / ${sentences.length}`;
        }

        let sentences = [];
        let currentIndex = 0;   
        let fetchIndex = 0;     
        let audioCache = {};    
        let inFlight = 0;       

        const BUFFER_DEPTH = 5; 
        const MAX_CONCURRENT_FETCHES = 1;

        let currentPageText = "";

        function startReadingPage(startIndex = 0) {
            if (!pdfDoc || !currentPageText.trim() || sentences.length === 0) return;

            if (isPlaying) stopPipeline(); 
            
            if (audioCache) {
                Object.values(audioCache).forEach(url => {
                    if (url) URL.revokeObjectURL(url);
                });
            }

            currentIndex = startIndex;
            fetchIndex = startIndex; 
            audioCache = {};
            inFlight = 0;
            isPlaying = true;

            playBtn.textContent = "⏹ Stop Reading";
            ttsStatus.classList.add('active');
            updateTtsStatus();
            
            preloadQueue();
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                stopPipeline();
            } else {
                if (!pdfDoc || !currentPageText.trim()) {
                    alert("No text found on this page.");
                    return;
                }
                
                let startIndex = currentIndex;
                if (startIndex >= sentences.length) startIndex = 0;
                
                startReadingPage(startIndex);
            }
        });

        function preloadQueue() {
            if (!isPlaying) return;

            while (
                fetchIndex < sentences.length &&
                inFlight < MAX_CONCURRENT_FETCHES &&
                (fetchIndex - currentIndex) < BUFFER_DEPTH
            ) {
                const indexToFetch = fetchIndex;
                fetchIndex++;
                inFlight++;
                fetchSentenceAudio(indexToFetch); 
            }
        }

        async function fetchSentenceAudio(indexToFetch) {
            try {
                const rawText = sentences[indexToFetch];

                const isBareShortNumber = /^\d{1,2}$/.test(rawText.trim());
                const textToSend = isBareShortNumber ? `Page ${rawText.trim()}.` : rawText;

                const fetchStart = performance.now();
                const selectedVoice = document.getElementById('voice-selector').value;
                const selectedSpeed = parseFloat(document.getElementById('speed-slider').value); 
                
                const response = await fetch('http://127.0.0.1:8000/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: textToSend,
                        voice: selectedVoice,
                        speed: selectedSpeed
                    })
                });

                if (!response.ok) {
                    let bodyText = '';
                    try { bodyText = await response.text(); } catch (_) {}
                    throw new Error(`Backend responded ${response.status}: ${bodyText.slice(0, 500)}`);
                }

                const blob = await response.blob();
                const totalMs = Math.round(performance.now() - fetchStart);
                console.log(`[TTS] sentence ${indexToFetch} ready in ${totalMs}ms`);
                audioCache[indexToFetch] = URL.createObjectURL(blob);

            } catch (error) {
                console.error(`Failed to generate sentence ${indexToFetch} ("${sentences[indexToFetch]}")`, error);
                audioCache[indexToFetch] = null;
            } finally {
                inFlight--;

                if (isPlaying && indexToFetch === currentIndex && audioPlayer.paused) {
                    playNextChunk();
                }
                preloadQueue();
            }
        }

        function playNextChunk() {
            if (!isPlaying) return;

            if (currentIndex >= sentences.length) {
                const autoContinue = document.getElementById('auto-read-next').checked;
                
                if (autoContinue && pageNum < pdfDoc.numPages) {
                    stopPipeline();
                    isAutoContinuing = true; 
                    goToPage(1, true);       
                } else {
                    stopPipeline();
                }
                return;
            }

            const nextAudioUrl = audioCache[currentIndex];

            if (nextAudioUrl) {
                highlightActiveSentence(currentIndex, sentences);
                updateTtsStatus();

                audioPlayer.src = nextAudioUrl;
                audioPlayer.play();
                console.log(`[TTS] playing sentence ${currentIndex} now`);

                audioPlayer.onended = () => {
                    URL.revokeObjectURL(nextAudioUrl);
                    delete audioCache[currentIndex];
                    currentIndex++;
                    updateSavedSession(pageNum, scale, currentIndex);
                    preloadQueue();
                    playNextChunk();
                };
            } else if (nextAudioUrl === null) {
                currentIndex++;
                playNextChunk();
            }
        }

        function stopPipeline() {
            isPlaying = false;
            audioPlayer.pause();
            playBtn.textContent = "▶ Play Current Page";
            ttsStatus.classList.remove('active');
        }

        // --- 5. Precision Substring Highlighter & Locked-Axis Auto-Scroll ---
        function highlightActiveSentence(sentenceIndex, allSentences) {
            const allSpans = Array.from(document.querySelectorAll('.textLayer span'));

            allSpans.forEach(span => {
                if (span.dataset.originalText === undefined) {
                    span.dataset.originalText = span.textContent;
                }
                span.textContent = span.dataset.originalText;
            });

            if (sentenceIndex < 0 || sentenceIndex >= allSentences.length) return;

            const normalize = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');

            let fullPageNorm = "";
            let spanMappings = [];

            allSpans.forEach((span) => {
                let rawText = span.dataset.originalText;
                let normText = normalize(rawText);
                let startPos = fullPageNorm.length;
                fullPageNorm += normText;

                spanMappings.push({
                    element: span,
                    rawText: rawText,
                    start: startPos,
                    end: fullPageNorm.length,
                    validChars: normText.length
                });
            });

            let currentCursor = 0;
            let matchIndex = -1;
            let targetNorm = "";

            for (let i = 0; i <= sentenceIndex; i++) {
                targetNorm = normalize(allSentences[i]);
                if (!targetNorm) continue;

                matchIndex = fullPageNorm.indexOf(targetNorm, currentCursor);
                if (matchIndex === -1) matchIndex = fullPageNorm.indexOf(targetNorm, 0);

                if (matchIndex !== -1) {
                    currentCursor = matchIndex + targetNorm.length;
                }
            }

            if (matchIndex === -1) return;
            const matchEnd = matchIndex + targetNorm.length;

            const escapeHTML = (str) => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            let firstHighlightEl = null;

            spanMappings.forEach(map => {
                let overlapAlphaStart = Math.max(map.start, matchIndex);
                let overlapAlphaEnd = Math.min(map.end, matchEnd);

                if (overlapAlphaStart < overlapAlphaEnd) {
                    let alphaCount = map.start;
                    let rawStart = 0;
                    let rawEnd = map.rawText.length;

                    for (let i = 0; i < map.rawText.length; i++) {
                        if (/[a-z0-9]/i.test(map.rawText[i])) {
                            if (alphaCount === overlapAlphaStart) rawStart = i;
                            alphaCount++;
                            if (alphaCount === overlapAlphaEnd) { rawEnd = i + 1; break; }
                        }
                    }

                    let before = escapeHTML(map.rawText.substring(0, rawStart));
                    let highlight = escapeHTML(map.rawText.substring(rawStart, rawEnd));
                    let after = escapeHTML(map.rawText.substring(rawEnd));

                    map.element.innerHTML = `${before}<mark class="reading-highlight">${highlight}</mark>${after}`;

                    if (!firstHighlightEl) {
                        firstHighlightEl = map.element.querySelector('mark.reading-highlight');
                    }
                }
            });

            if (firstHighlightEl && viewerArea) {
                const containerRect = viewerArea.getBoundingClientRect();
                const highlightRect = firstHighlightEl.getBoundingClientRect();

                const relativeTop = highlightRect.top - containerRect.top;
                const relativeBottom = highlightRect.bottom - containerRect.top;
                const viewHeight = containerRect.height;

                if (relativeTop < viewHeight * 0.2 || relativeBottom > viewHeight * 0.8) {
                    const targetScrollTop = viewerArea.scrollTop + (relativeTop - viewHeight / 3);
                    viewerArea.scrollTo({
                        top: targetScrollTop,
                        behavior: 'smooth'
                    });
                }
            }
        }

        // --- 6. Core Reader Logic ---
        async function loadPDF(file, startingPage = 1) {
            const fileUrl = URL.createObjectURL(file);
            welcomeScreen.classList.remove('active');
            readerScreen.classList.add('active');

            try {
                const loadingTask = pdfjsLib.getDocument(fileUrl);
                pdfDoc = await loadingTask.promise;
                document.getElementById('page-count').textContent = pdfDoc.numPages;

                pageNum = startingPage;
                renderPage(pageNum);
            } catch (error) {
                console.error("Error loading PDF:", error);
                alert("Failed to load PDF.");
                resetUI();
            }
        }

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file && file.type === 'application/pdf') {
                saveToDB(file, 1, scale, 0);
                loadPDF(file, 1);
            }
        });

        document.getElementById('close-file').addEventListener('click', resetUI);

        function resetUI() {
            stopPipeline();
            pdfDoc = null;
            fileInput.value = '';
            clearSavedDocument();

            readerScreen.classList.remove('active');
            welcomeScreen.classList.add('active');
            document.getElementById('text-layer').innerHTML = '';
        }

        async function renderPage(num) {
            pageIsRendering = true;
            try {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale: scale });

                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');

                const outputScale = window.devicePixelRatio || 1;
                const cssWidth = Math.floor(viewport.width);
                const cssHeight = Math.floor(viewport.height);

                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = cssWidth + 'px';
                canvas.style.height = cssHeight + 'px';

                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderContext = { canvasContext: context, viewport: viewport, transform: transform };
                await page.render(renderContext).promise;

                const textLayerDiv = document.getElementById('text-layer');
                textLayerDiv.innerHTML = '';
                textLayerDiv.style.height = cssHeight + 'px';
                textLayerDiv.style.width = cssWidth + 'px';

                textLayerDiv.style.setProperty('--scale-factor', viewport.scale);

                const textContent = await page.getTextContent();

                const bracketedNumberPattern = /^[\[\(\{"'\-–—•·\s]*(\d+(?:[.,]\d+)*)[\]\)\}"'\-–—•·\s]*$/;
                const decorativeOnlyPattern = /^[\[\]\(\)\{\}"'\-–—•·|_=~^]+$/;

                currentPageText = textContent.items.reduce((acc, item) => {
                    const str = item.str;
                    const trimmed = str.trim();
                    if (!trimmed) return acc + str + ' ';

                    const numMatch = trimmed.match(bracketedNumberPattern);
                    if (numMatch) {
                        return acc + '\n' + numMatch[1] + '\n';
                    }
                    if (decorativeOnlyPattern.test(trimmed)) {
                        return acc; 
                    }
                    return acc + str + ' ';
                }, '');
                
                sentences = splitIntoTTSChunks(currentPageText, 120);

                await pdfjsLib.renderTextLayer({
                    textContentSource: textContent,
                    container: textLayerDiv,
                    viewport,
                    textDivs: [],
                    enhanceTextSelection: true
                }).promise;

                document.getElementById('page-num').textContent = num;
                prevPageBtn.disabled = num <= 1;
                nextPageBtn.disabled = num >= pdfDoc.numPages;

                pageIsRendering = false;

                if (pageNumPending !== null) {
                    const pending = pageNumPending;
                    pageNumPending = null;
                    renderPage(pending);
                    return;
                }

                if (currentIndex < sentences.length) {
                    highlightActiveSentence(currentIndex, sentences);
                }

                if (isAutoContinuing) {
                    isAutoContinuing = false; 
                    
                    setTimeout(() => {
                        if (currentPageText.trim()) {
                            startReadingPage();
                        } else if (pageNum < pdfDoc.numPages) {
                            isAutoContinuing = true;
                            goToPage(1, true);
                        } else {
                            stopPipeline();
                        }
                    }, 600);
                }
            } catch (error) {
                console.error("Error rendering page:", error);
                pageIsRendering = false;
            }
        }

        function queueRenderPage(num) {
            if (pageIsRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function goToPage(delta, isAutoTurn = false) {
            if (!pdfDoc) return;
            const target = pageNum + delta;
            if (target < 1 || target > pdfDoc.numPages) return;

            if (!isAutoTurn) {
                stopPipeline();
                isAutoContinuing = false; 
            }
            currentIndex = 0;

            pageNum = target;
            queueRenderPage(pageNum);
            updateSavedSession(pageNum, scale, currentIndex);
            viewerArea.scrollTo({ top: 0, behavior: 'smooth' });
        }

        prevPageBtn.addEventListener('click', () => goToPage(-1));
        nextPageBtn.addEventListener('click', () => goToPage(1));

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                resetUI();
                return;
            }
            if (!pdfDoc) return;

            if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'h') {
                goToPage(-1);
            }
            if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'l') {
                goToPage(1);
            }
        });

        function splitIntoTTSChunks(text, maxLength = 120) {
            let initialChunks = text
                .split('\n')
                .flatMap(chunk => chunk.split(/(?<=[.!?])\s+/))
                .map(s => s.trim())
                .filter(s => s.length > 0);

            let finalChunks = [];

            initialChunks.forEach(chunk => {
                if (chunk.length <= maxLength) {
                    finalChunks.push(chunk);
                    return;
                }

                let subChunks = chunk.split(/(?<=[,;:\-—])\s+/);
                let currentStr = "";

                subChunks.forEach(sub => {
                    if ((currentStr.length + sub.length) <= maxLength) {
                        currentStr += (currentStr ? " " : "") + sub;
                    } else {
                        if (currentStr) finalChunks.push(currentStr.trim());
                        
                        if (sub.length > maxLength) {
                            let words = sub.split(/\s+/);
                            let wordStr = "";
                            words.forEach(w => {
                                if ((wordStr.length + w.length) <= maxLength) {
                                    wordStr += (wordStr ? " " : "") + w;
                                } else {
                                    if (wordStr) finalChunks.push(wordStr.trim());
                                    wordStr = w;
                                }
                            });
                            currentStr = wordStr;
                        } else {
                            currentStr = sub;
                        }
                    }
                });
                if (currentStr) finalChunks.push(currentStr.trim());
            });

            return finalChunks;
        }

        // --- Click-to-Play Feature ---
        document.getElementById('text-layer').addEventListener('click', (e) => {
            let targetSpan = e.target;
            
            if (targetSpan.tagName.toLowerCase() === 'mark') {
                targetSpan = targetSpan.parentElement; 
            }
            if (targetSpan.tagName.toLowerCase() !== 'span') return;
            if (!sentences || sentences.length === 0) return;

            const allSpans = Array.from(document.querySelectorAll('.textLayer span'));
            const targetIndex = allSpans.indexOf(targetSpan);
            if (targetIndex === -1) return;

            const normalize = (str) => (str || "").toLowerCase().replace(/[^a-z0-9]/g, '');

            let fullPageNorm = "";
            let spanOffsets = [];

            allSpans.forEach(span => {
                let rawText = span.dataset.originalText !== undefined ? span.dataset.originalText : span.textContent;
                spanOffsets.push(fullPageNorm.length);
                fullPageNorm += normalize(rawText);
            });

            const clickedOffset = spanOffsets[targetIndex];

            let currentCursor = 0;
            let matchIndex = -1;
            let foundIndex = -1;

            for (let i = 0; i < sentences.length; i++) {
                let targetNorm = normalize(sentences[i]);
                if (!targetNorm) continue;

                matchIndex = fullPageNorm.indexOf(targetNorm, currentCursor);
                if (matchIndex === -1) matchIndex = fullPageNorm.indexOf(targetNorm, 0);

                if (matchIndex !== -1) {
                    let matchEnd = matchIndex + targetNorm.length;
                    
                    if (clickedOffset < matchEnd) {
                        foundIndex = i;
                        break;
                    }
                    currentCursor = matchEnd;
                }
            }

            if (foundIndex !== -1) {
                startReadingPage(foundIndex);
            }
        });
    </script>
</body>
